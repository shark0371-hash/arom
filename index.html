<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에니어그램 성격유형검사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#20242b;
    --paper:#f6f2ea;
    --paper-2:#efe9dc;
    --navy:#232946;
    --navy-2:#3a4270;
    --ochre:#b9812f;
    --line:#d9d0bd;
    --muted:#7a7266;
    --white:#fffdf8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans KR',sans-serif;
    line-height:1.6;
    min-height:100vh;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  h1,h2,h3,.serif{font-family:'Noto Serif KR',serif;}
  .wrap{max-width:760px;margin:0 auto;padding:32px 20px 90px;}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 20px;border-bottom:1px solid var(--line);
    max-width:760px;margin:0 auto;
  }
  .brand{display:flex;align-items:center;gap:10px;font-family:'Noto Serif KR',serif;font-weight:600;font-size:18px;color:var(--navy);}
  .brand svg{flex-shrink:0;}
  .navlink{font-size:13px;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:3px;}
  .navlink:hover{color:var(--navy);}
  .hero{padding:34px 0 8px;}
  .hero .eyebrow{font-size:12px;letter-spacing:.14em;color:var(--ochre);font-weight:700;text-transform:uppercase;}
  .hero h1{font-size:30px;margin:10px 0 6px;color:var(--navy);}
  .hero p{color:var(--muted);font-size:15px;max-width:520px;}
  .card{
    background:var(--white);border:1px solid var(--line);border-radius:8px;
    padding:28px;margin-bottom:20px;
  }
  .card h3{margin:0 0 12px;font-size:18px;color:var(--navy);font-weight:700;letter-spacing:-.02em;}
  .card p{margin:0 0 16px;color:var(--ink);font-size:14.5px;line-height:1.8;}
  .card p:last-child{margin-bottom:0;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  @media (max-width:600px){.row2{grid-template-columns:1fr;}}
  button{
    font-family:'Noto Sans KR',sans-serif;font-size:14.5px;font-weight:500;
    border-radius:3px;border:1px solid var(--navy);padding:10px 18px;
    cursor:pointer;transition:.15s;
  }
  .btn-primary{background:var(--navy);color:var(--white);}
  .btn-primary:hover{background:var(--navy-2);}
  .btn-ghost{background:transparent;color:var(--navy);}
  .btn-ghost:hover{background:var(--paper-2);}
  .btn-block{width:100%;}
  input[type=text],input[type=number],select{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:3px;
    font-family:'Noto Sans KR',sans-serif;font-size:14.5px;background:var(--white);
  }
  label.field-label{font-size:12.5px;color:var(--muted);display:block;margin-bottom:5px;}
  .field{margin-bottom:16px;}

  /* 생년월일 스크롤 피커 */
  .picker{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:8px;}
  .picker-col{position:relative;height:220px;overflow:hidden;border:1px solid var(--line);border-radius:6px;background:var(--white);}
  .picker-scroll{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  .picker-scroll::-webkit-scrollbar{display:none;}
  .picker-item{height:44px;line-height:44px;text-align:center;scroll-snap-align:center;
    font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--muted);transition:color .1s,font-size .1s;}
  .picker-item.sel{color:var(--navy);font-weight:700;font-size:18px;}
  .picker-pad{height:88px;}
  .picker-highlight{position:absolute;top:88px;left:0;right:0;height:44px;pointer-events:none;
    border-top:1px solid var(--ochre);border-bottom:1px solid var(--ochre);background:rgba(185,129,47,0.06);}
  .picker-labels{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:8px;margin-top:4px;}
  .picker-labels span{text-align:center;font-size:11px;color:var(--muted);}

  /* 가족관계 칩(태그) */
  .chip-wrap{display:flex;flex-wrap:wrap;gap:6px;margin:-6px 0 16px;}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--navy);color:#fff;
    font-size:13px;padding:5px 8px 5px 12px;border-radius:16px;}
  .chip-x{cursor:pointer;font-size:11px;width:16px;height:16px;border-radius:50%;
    background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;}
  .chip-x:active{background:rgba(255,255,255,0.5);}
  .link-box{
    display:flex;gap:8px;align-items:center;background:var(--paper-2);
    border:1px dashed var(--line);padding:10px 12px;border-radius:3px;font-size:13px;
  }
  .link-box input{border:none;background:transparent;flex:1;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--navy);}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--line);}
  .toggle-row:first-of-type{border-top:none;}
  .switch{position:relative;width:42px;height:24px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;cursor:pointer;inset:0;background:#cfc6b3;border-radius:24px;transition:.2s;}
  .slider:before{content:"";position:absolute;height:18px;width:18px;left:3px;top:3px;background:white;border-radius:50%;transition:.2s;}
  input:checked + .slider{background:var(--navy);}
  input:checked + .slider:before{transform:translateX(18px);}

  /* progress */
  .progress-wrap{position:sticky;top:0;background:var(--paper);padding:14px 0 10px;z-index:5;}
  .progress-track{height:5px;background:var(--paper-2);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--ochre);transition:width .2s;}
  .progress-label{font-size:12px;color:var(--muted);margin-top:6px;font-family:'JetBrains Mono',monospace;}

  .qgroup{margin-bottom:22px;}
  .qnum{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ochre);}
  .qtext{font-size:15.5px;margin:4px 0 12px;color:var(--ink);}

  /* 단일 문항 화면 */
  .q-single{padding:30px 4px 10px;text-align:center;}
  .q-single .qnum{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ochre);margin-bottom:14px;}
  .q-big{font-size:22px;line-height:1.5;color:var(--navy);font-family:'Noto Serif KR',serif;font-weight:600;
    margin:0 auto 30px;max-width:520px;min-height:66px;display:flex;align-items:center;justify-content:center;}
  @media (max-width:400px){.q-big{font-size:19px;}}

  .scale{display:flex;flex-direction:column;gap:10px;max-width:460px;margin:0 auto;}
  .scale label{
    border:1px solid var(--line);border-radius:8px;
    padding:16px 18px;font-size:16px;color:var(--ink);cursor:pointer;background:var(--white);
    display:flex;align-items:center;justify-content:center;transition:.12s;
  }
  .scale label .lab{font-size:16px;}
  .scale input{position:absolute;opacity:0;pointer-events:none;}
  .scale label.checked{border-color:var(--navy);background:var(--navy);}
  .scale label.checked .lab{color:white;font-weight:600;}
  .scale label:active{transform:scale(0.98);}

  .stepnav{display:flex;justify-content:space-between;margin-top:26px;gap:10px;}

  /* 시작화면 브로슈어 */
  .intro-cover{text-align:center;padding:34px 20px 24px;margin-bottom:16px;
    background:linear-gradient(160deg,#fbf6ef,#f1e9dc);border:1px solid var(--line);border-radius:6px;}
  .intro-brand{font-size:34px;letter-spacing:.14em;color:#8a8378;font-weight:700;}
  .intro-en{font-size:12px;color:var(--muted);letter-spacing:.05em;margin-top:10px;}
  .intro-title{font-size:30px;color:var(--navy);margin:4px 0 6px;}
  .intro-sub{font-size:15px;color:var(--ochre);font-weight:600;}
  .type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px;}
  .type-card{text-align:center;padding:12px 6px;border:1px solid var(--line);border-radius:6px;background:var(--white);}
  .type-num{width:30px;height:30px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;margin:0 auto 6px;}
  .type-lab{font-size:11.5px;color:var(--ink);line-height:1.3;}
  @media (max-width:400px){.type-lab{font-size:10.5px;}}

  /* results */
  .rank-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--line);}
  .rank-item:first-of-type{border-top:none;}
  .rank-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:white;flex-shrink:0;}
  .rank-name{flex:1;font-size:14.5px;}
  .rank-name b{color:var(--navy);}
  .rank-score{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--muted);}
  .type-desc{font-size:13px;color:var(--muted);margin-top:2px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}

  /* 결과화면 개선 */
  .detail-section{margin-bottom:24px;}
  .detail-section-title{
    font-size:12.5px;font-weight:700;color:#5a5550;text-transform:uppercase;letter-spacing:.1em;
    padding-bottom:10px;border-bottom:2px solid var(--line);margin-bottom:14px;
  }
  .detail-item{display:grid;grid-template-columns:75px 1fr;gap:16px;margin-bottom:14px;align-items:start;}
  .detail-item-label{
    font-size:13px;font-weight:700;color:var(--navy);
  }
  .detail-item-content{font-size:14.5px;color:var(--ink);line-height:1.8;}
  .detail-item-content .sub{font-size:12.5px;color:var(--muted);display:block;margin-top:4px;}

  .rank-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px;}
  @media (max-width:500px){.rank-grid{grid-template-columns:repeat(2,1fr);gap:10px;}}
  .rank-card{
    background:linear-gradient(135deg, #fafaf7, #f6f2ea);border:1px solid #e5dcc9;border-radius:10px;
    padding:16px 12px;text-align:center;transition:.15s;
  }
  .rank-card:active{transform:scale(0.98);}
  .rank-card-num{
    width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:700;color:white;font-size:18px;margin:0 auto 8px;
  }
  .rank-card-name{font-size:13.5px;font-weight:700;color:var(--navy);margin-bottom:3px;line-height:1.4;}
  .rank-card-sub{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.4;}
  .rank-card-score{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--navy);}
  .rank-card-score-label{font-size:10px;color:#999;display:block;margin-top:2px;}

  /* 응답 목록 카드형 행 */
  .list-row{display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--line);
    border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.12s;}
  .list-row:active{transform:scale(0.99);}
  .list-row.sel{border-color:var(--navy);background:#eef0f7;}
  .lr-check{font-size:18px;flex-shrink:0;}
  .lr-main{flex:1;min-width:0;}
  .lr-name{font-size:15.5px;font-weight:600;color:var(--ink);}
  .lr-typename{font-size:12.5px;font-weight:400;color:var(--muted);margin-left:4px;}
  .lr-info{font-size:12px;color:var(--muted);margin-top:2px;}
  .lr-right{text-align:right;flex-shrink:0;}
  .lr-type{display:inline-block;color:#fff;font-family:'JetBrains Mono',monospace;font-weight:700;
    font-size:12.5px;padding:3px 9px;border-radius:20px;}
  .lr-date{font-size:11px;color:var(--muted);margin-top:4px;}
  .lr-del{flex-shrink:0;font-size:16px;opacity:.5;padding:4px;}
  .lr-del:active{opacity:1;}

  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line);}
  th{color:var(--muted);font-weight:500;font-size:12px;}
  tr:hover td{background:var(--paper-2);cursor:pointer;}

  .top-result-banner{
    text-align:center;padding:36px 24px;background:var(--navy);color:var(--white);
    border-radius:8px;margin-bottom:24px;
  }
  .top-result-banner .eyebrow{color:#e3b06a;font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-bottom:10px;}
  .top-result-banner h2{font-size:28px;margin:6px 0 8px;font-weight:700;}
  .top-result-banner p{color:#d4d7f0;font-size:14px;max-width:480px;margin:0 auto;line-height:1.6;}

  .site-footer{
    max-width:760px;margin:20px auto 0;padding:22px 20px 40px;
    border-top:1px solid var(--line);text-align:center;
  }
  .footer-brand{font-size:20px;letter-spacing:.12em;color:var(--navy);font-weight:700;}
  .footer-line{font-size:12.5px;color:var(--muted);margin-top:4px;}
  .footer-copy{font-size:11.5px;color:var(--muted);margin-top:12px;line-height:1.6;}

  /* 인쇄 오버레이: 화면에선 숨김, 인쇄할 때만 이것만 보임 */
  #printArea{display:none;}
  @media print{
    body > *{display:none !important;}
    #printArea{display:block !important;padding:0;max-width:640px;margin:0 auto;color:#20242b;}
    #printArea h1{font-size:22px;margin:0 0 2px;}
    #printArea .p-sub{color:#7a7266;font-size:13px;margin-bottom:16px;}
    #printArea .p-banner{background:#232946 !important;color:#fff !important;border-radius:6px;padding:18px;text-align:center;margin-bottom:16px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    #printArea .p-banner .p-t{color:#e3b06a;font-size:11px;letter-spacing:.1em;}
    #printArea .p-banner h2{margin:6px 0 4px;font-size:19px;}
    #printArea .p-banner p{color:#c7cadf;font-size:12.5px;margin:0;}
    #printArea .p-info{font-size:13px;line-height:1.8;margin-bottom:12px;}
    #printArea .p-chart{text-align:center;margin:8px 0 14px;}
    #printArea table{width:100%;border-collapse:collapse;font-size:13px;}
    #printArea td{padding:7px 6px;border-bottom:1px solid #e5ddcc;}
    #printArea .p-footer{margin-top:22px;border-top:1px solid #ddd;padding-top:12px;text-align:center;}
    #printArea .p-footer .p-b{font-weight:700;letter-spacing:.1em;font-size:15px;color:#232946;}
    #printArea .p-footer .p-c{font-size:11px;color:#7a7266;margin-top:6px;line-height:1.5;}
    .p-badge{display:inline-block;width:20px;height:20px;border-radius:50%;color:#fff !important;text-align:center;line-height:20px;font-size:11px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }

  @media print{
    .no-print{display:none !important;}
    body{background:white;}
    .card{border:1px solid #ccc;}
    .top-result-banner{background:white !important;color:var(--ink) !important;border:1px solid var(--navy);}
    .top-result-banner .eyebrow{color:var(--ochre) !important;}
    .top-result-banner p{color:var(--muted) !important;}
    .site-footer{border-top:1px solid #ccc;}
  }
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
/* ================= Firebase 초기화 ================= */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBpl-f_KQe9cjrfthOalvPY6t8JKOAxNy4",
  authDomain: "anyagram-86065.firebaseapp.com",
  projectId: "anyagram-86065",
  storageBucket: "anyagram-86065.firebasestorage.app",
  messagingSenderId: "494199832878",
  appId: "1:494199832878:web:60375224d767c341c97abf"
};
let _db = null;
let FIREBASE_READY = false;
try{
  if(window.firebase && firebase.initializeApp){
    firebase.initializeApp(FIREBASE_CONFIG);
    _db = firebase.firestore();
    FIREBASE_READY = true;
  }
}catch(e){ console.warn('Firebase 초기화 실패:', e); FIREBASE_READY = false; }

// Firestore에 응답 저장
async function fbSaveResponse(record){
  if(!FIREBASE_READY) return false;
  try{
    // undefined 값은 Firestore가 거부하므로 JSON 왕복으로 제거
    const clean = JSON.parse(JSON.stringify(record));
    delete clean._pending; // 내부 플래그는 Firebase에 저장하지 않음
    await _db.collection('responses').doc(clean.id).set(clean);
    return true;
  }catch(e){ console.warn('Firestore 저장 실패:', e); return false; }
}
// Firestore에서 전체 응답 불러오기
async function fbGetResponses(){
  if(!FIREBASE_READY) return null;
  try{
    const snap = await _db.collection('responses').orderBy('date','asc').get();
    return snap.docs.map(d=>d.data());
  }catch(e){ console.warn('Firestore 불러오기 실패:', e); return null; }
}
// Firestore에서 응답 삭제
async function fbDeleteResponse(id){
  if(!FIREBASE_READY) return false;
  try{ await _db.collection('responses').doc(id).delete(); return true; }
  catch(e){ console.warn('Firestore 삭제 실패:', e); return false; }
}
// 공용 설정(결과 즉시 표시 여부 등)을 Firebase에 저장/조회 → 모든 기기 공유
async function fbSaveSettings(s){
  if(!FIREBASE_READY) return false;
  try{ await _db.collection('config').doc('settings').set(JSON.parse(JSON.stringify(s))); return true; }
  catch(e){ console.warn('설정 저장 실패:', e); return false; }
}
async function fbGetSettings(){
  if(!FIREBASE_READY) return null;
  try{
    const doc = await _db.collection('config').doc('settings').get();
    return doc.exists ? doc.data() : null;
  }catch(e){ console.warn('설정 조회 실패:', e); return null; }
}
</script>

<script>

// 분열: 1→4→2→8→5→7→1, 9→6→3→9  /  통합은 그 역방향
const DISINTEGRATION = {1:4, 4:2, 2:8, 8:5, 5:7, 7:1, 9:6, 6:3, 3:9};
const INTEGRATION     = {4:1, 2:4, 8:2, 5:8, 7:5, 1:7, 6:9, 3:6, 9:3};
function typeDirections(mainId){
  return {
    stress: DISINTEGRATION[mainId],   // 스트레스 상황에서 닮아가는 유형(불건강)
    growth: INTEGRATION[mainId],      // 안정/건강 상황에서 닮아가는 유형
  };
}

const typeColor = id => {
  const hue = (220 + (id-1)*38) % 360;
  return `hsl(${hue},38%,38%)`;
};
const typeColorLight = id => {
  const hue = (220 + (id-1)*38) % 360;
  return `hsl(${hue},55%,88%)`;
};

// 참고 프로파일 가로축 순서: 2,3,4,5,6,7,8,9,1
const PROFILE_ORDER = [2,3,4,5,6,7,8,9,1];

function typeById(id){ return TYPES.find(t=>t.id===id); }

// 대표 유형의 날개 계산: 양옆(원형 1↔9 인접) 유형 중 점수가 높은 쪽
function calcWing(scores){
  const ranked = TYPES.map(t=>({id:t.id, score:scores[t.id]})).sort((a,b)=>b.score-a.score);
  const main = ranked[0].id;
  const left = main===1 ? 9 : main-1;
  const right = main===9 ? 1 : main+1;
  const wing = (scores[left] >= scores[right]) ? left : right;
  const label = `${main}W${wing}`;
  return { main, wing, label, wingName: WING_NAMES[label]||'', wingDesc: WING_DESC[label]||'' };
}

/* ================= 저장소 (브라우저 localStorage 사용) ================= */
function _lsGet(key, fallback){
  try{
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  }catch(e){ return fallback; }
}
function _lsSet(key, val){
  try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
}
function getResponses(){ return _lsGet('kepti_responses', []); }
function saveResponses(list){ _lsSet('kepti_responses', list); }
function getSettings(){ return _lsGet('kepti_settings', {showResultImmediately:false}); }
function saveSettings(s){ _lsSet('kepti_settings', s); }
function saveDraft(){
  const draft = { answers: state.answers, page: state.page, meta: state.meta, ts: Date.now() };
  _lsSet('kepti_draft', draft);
}
function getDraft(){ return _lsGet('kepti_draft', null); }
function clearDraft(){ try{ localStorage.removeItem('kepti_draft'); }catch(e){} }
function draftHasProgress(d){
  return d && ((d.answers && Object.keys(d.answers).length>0) || (d.meta && d.meta.name));
}

// 사용자 입력(이름/직업 등) HTML 이스케이프 — 특수문자로 화면 깨짐 방지
function esc(s){
  if(s===undefined || s===null) return '';
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

  if(IS_ADMIN && state.view!=='landing'){
    const back = document.createElement('span');
    back.className='navlink'; back.textContent='← 처음으로';
    back.onclick = async ()=>{
      if(state.view==='survey') await saveDraft();
      state.view='landing'; state.answers={}; state.page=0; state.meta={name:'',gender:'',relations:[],job:'',birth:''}; render();
    };
    navRight.appendChild(back);
  }

  if(state.view==='intro') return renderIntro(app);
  if(state.view==='landing') return renderLanding(app);
  if(state.view==='survey') return renderSurvey(app);
  if(state.view==='result') return renderResult(app);
  if(state.view==='list') return renderList(app);
  if(state.view==='couple') return renderCouple(app);
}

/* ---------- 생년월일 스크롤 피커 ---------- */
const ITEM_H = 44;
function _pickerData(){
  const now = new Date().getFullYear();
  const years=[]; for(let y=now; y>=1930; y--) years.push(y);
  const months=[]; for(let m=1;m<=12;m++) months.push(m);
  const days=[]; for(let d=1;d<=31;d++) days.push(d);
  return {years, months, days};
}
function setupRelationChips(){
  const pick = document.getElementById('metaRelationPick');
  const wrap = document.getElementById('relationChips');
  if(!pick || !wrap) return;
  if(!Array.isArray(state.meta.relations)) state.meta.relations = [];
  function draw(){
    wrap.innerHTML = state.meta.relations.map((r,i)=>
      `<span class="chip">${esc(r)}<span class="chip-x" data-i="${i}">✕</span></span>`
    ).join('');
    wrap.querySelectorAll('.chip-x').forEach(x=>{
      x.onclick = ()=>{
        const i = +x.dataset.i;
        state.meta.relations.splice(i,1);
        saveDraft(); draw();
      };
    });
  }
  pick.onchange = ()=>{
    const v = pick.value;
    if(!v){ pick.value=''; return; }
    // 여러 명 가능한 관계(아들·딸·손자·손녀·형제·자매): 같은 관계 추가 시 번호 붙임
    const multi = ['아들','딸','손자','손녀','형제','자매'];
    if(multi.includes(v)){
      const sameCount = state.meta.relations.filter(r=>r===v || r.startsWith(v)).length;
      const label = sameCount===0 ? v : `${v}${sameCount+1}`;
      state.meta.relations.push(label);
      saveDraft(); draw();
    } else {
      // 단일 관계(남편/아내/본인/부/모/조부/조모/기타): 중복 방지
      if(!state.meta.relations.includes(v)){
        state.meta.relations.push(v);
        saveDraft(); draw();
      }
    }
    pick.value = ''; // 다시 "+ 추가"로 리셋
  };
  draw();
}

function setupBirthPicker(){
  const picker = document.getElementById('birthPicker');
  if(!picker) return;
  const {years, months, days} = _pickerData();
  const lists = {year:years, month:months, day:days};
  // 기존 저장값 or 기본값(2000.1.1)
  let cur = {year:2000, month:1, day:1};
  if(state.meta.birth){
    const p = state.meta.birth.split('-');
    if(p.length===3){ cur = {year:+p[0], month:+p[1], day:+p[2]}; }
  }
  picker.querySelectorAll('.picker-scroll').forEach(scroll=>{
    const unit = scroll.dataset.unit;
    const arr = lists[unit];
    scroll.innerHTML = `<div class="picker-pad"></div>` +
      arr.map(v=>`<div class="picker-item" data-v="${v}">${v}</div>`).join('') +
      `<div class="picker-pad"></div>`;
    // 초기 위치로 스크롤
    const idx = arr.indexOf(cur[unit]);
    requestAnimationFrame(()=>{ scroll.scrollTop = Math.max(0,idx) * ITEM_H; updateSel(scroll); });
    let t;
    scroll.addEventListener('scroll', ()=>{
      updateSel(scroll);
      clearTimeout(t);
      t = setTimeout(()=>{
        const i = Math.round(scroll.scrollTop / ITEM_H);
        scroll.scrollTo({top:i*ITEM_H, behavior:'smooth'});
        saveDraftBirth();
      }, 120);
    });
  });
}
function updateSel(scroll){
  const i = Math.round(scroll.scrollTop / ITEM_H);
  scroll.querySelectorAll('.picker-item').forEach((el,idx)=>{
    el.classList.toggle('sel', idx===i);
  });
}
function readBirthPicker(){
  const picker = document.getElementById('birthPicker');
  if(!picker) return state.meta.birth || '';
  const {years, months, days} = _pickerData();
  const lists = {year:years, month:months, day:days};
  const val = {};
  picker.querySelectorAll('.picker-scroll').forEach(scroll=>{
    const arr = lists[scroll.dataset.unit];
    const i = Math.round(scroll.scrollTop / ITEM_H);
    val[scroll.dataset.unit] = arr[Math.max(0,Math.min(arr.length-1,i))];
  });
  return `${val.year}-${String(val.month).padStart(2,'0')}-${String(val.day).padStart(2,'0')}`;
}
function saveDraftBirth(){
  state.meta.birth = readBirthPicker();
  saveDraft();
}
function birthToAge(birth){
  if(!birth) return '';
  const p = birth.split('-'); if(p.length<1) return '';
  const by = +p[0]; if(!by) return '';
  return (new Date().getFullYear() - by + 1); // 한국식 나이(대략)
}
// 만나이 계산 (생일 지났는지 반영)
function birthToIntlAge(birth){
  if(!birth) return '';
  const p = birth.split('-');
  const y = +p[0], m = +(p[1]||1), d = +(p[2]||1);
  if(!y) return '';
  const now = new Date();
  let age = now.getFullYear() - y;
  const mm = now.getMonth()+1, dd = now.getDate();
  if(mm < m || (mm===m && dd < d)) age--; // 아직 올해 생일 안 지남
  return age;
}

async function sendResultEmail(record){
  if(!WEB3FORMS_KEY || WEB3FORMS_KEY.indexOf('여기에')>-1) return false;
  const ranked = TYPES.map(t=>({...t, score:record.scores[t.id]})).sort((a,b)=>b.score-a.score);
  const top = ranked[0];
  const w = calcWing(record.scores);
  const d = new Date(record.date);
  const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  const rankText = ranked.map((t,i)=>`${i+1}위. ${t.id}번 ${t.name}(${t.sub}) — ${t.score}/45`).join('\n');
  const body =
    `■ 에니어그램 검사 결과\n\n`+
    `이름: ${record.name}\n`+
    `성별: ${record.gender||'-'}\n`+
    `직업: ${record.job||'-'}\n`+
    `생년월일: ${record.birth||'-'}${record.birth?` (만 ${birthToAge(record.birth)-1}세 전후)`:''}\n`+
    `검사일시: ${dateStr}\n\n`+
    `▶ 대표 유형: ${w.label} ${w.wingName||''} (${top.id}번 ${top.name})\n`+
    `${top.desc}\n\n`+
    `▶ 전체 순위\n${rankText}\n`;
  try{
    const res = await fetch('https://api.web3forms.com/submit', {
      method:'POST',
      headers:{'Content-Type':'application/json', 'Accept':'application/json'},
      body: JSON.stringify({
        access_key: WEB3FORMS_KEY,
        subject: `[에니어그램] ${record.name}님 · ${w.label} ${top.name}`,
        from_name: '에니어그램 자동채점',
        name: record.name,
        message: body
      })
    });
    const ok = res && res.ok;
    markEmailStatus(record.id, ok ? 'sent' : 'failed');
    return ok;
  }catch(e){
    markEmailStatus(record.id, 'failed');
    return false;
  }
}

function markEmailStatus(recordId, status){
  const list = getResponses();
  const rec = list.find(r=>r.id===recordId);
  if(rec){ rec.emailStatus = status; saveResponses(list); }
  if(state.lastResult && state.lastResult.id===recordId){ state.lastResult.emailStatus = status; }
}

let _submitting = false;
async function submitSurvey(){
  if(_submitting) return; // 더블탭 중복 제출 방지
  _submitting = true;
  try{
  const scores = {};
  TYPES.forEach(t=>scores[t.id]=0);
  for(let q=1; q<=81; q++){
    const v = parseInt(state.answers[q]||0,10);
    const tid = itemToType[q];
    scores[tid] += v;
  }
  const record = {
    id: 'r_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
    name: state.meta.name||'', gender: state.meta.gender||'', relation: (state.meta.relations||[]).join(', '), job: state.meta.job||'', birth: state.meta.birth||'',
    date: new Date().toISOString(),
    answers: state.answers,
    scores,
    emailStatus: 'pending',
  };
  const list = await getResponses();
  list.push(record);
  await saveResponses(list);      // 로컬 캐시에 저장 (오프라인 대비)
  // 공용 저장소(Firebase)에 저장 → 실패하면 _pending 표시 후 다음 동기화 때 재시도
  fbSaveResponse(record).then(ok=>{
    if(!ok){
      const all = getResponses();
      const r = all.find(x=>x.id===record.id);
      if(r){ r._pending = true; saveResponses(all); }
    }
  });
  await clearDraft();
  state.lastResult = record;

  // 결과 이메일 자동 전송 (실패해도 로컬 저장/결과 표시는 정상 진행)
  sendResultEmail(record);

/* ---------- 결과 ---------- */
function radarSVG(scores){
  const size=320, cx=size/2, cy=size/2, R=118, maxScore=45, n=9;
  // 9를 맨 위(12시)로, 시계방향 9,1,2,3,4,5,6,7,8
  const ORDER = [9,1,2,3,4,5,6,7,8];
  const angle = i => (Math.PI*2*i/n) - Math.PI/2;
  const pt = (i,r) => [cx + r*Math.cos(angle(i)), cy + r*Math.sin(angle(i))];
  let rings='';
  [0.25,0.5,0.75,1].forEach(f=>{
    let pts=[]; for(let i=0;i<n;i++){ const [x,y]=pt(i,R*f); pts.push(`${x},${y}`); }
    rings += `<polygon points="${pts.join(' ')}" fill="none" stroke="#d9d0bd" stroke-width="1"/>`;
  });
  let spokes='', labels='';
  for(let i=0;i<n;i++){
    const [x,y]=pt(i,R);
    spokes += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#d9d0bd" stroke-width="1"/>`;
    const typeObj = TYPES.find(t=>t.id===ORDER[i]);
    const typeLabel = `${ORDER[i]}${typeObj?.name||''}`;
    
    // 각 방향별 라벨 거리와 정렬 조정
    let lx, ly, anchor='middle', baseline='middle', offset=24;
    const ang = angle(i);
    
    // 12시 방향 (i=0 또는 근처): 위쪽
    if(i===0) { offset=28; baseline='bottom'; ly=cy + R*Math.sin(ang) - offset; }
    // 3시 방향 (i=2): 우측
    else if(i===2) { offset=22; anchor='start'; lx=cx + R*Math.cos(ang) + offset; }
    // 6시 방향 (i=4): 아래쪽
    else if(i===4) { offset=28; baseline='top'; ly=cy + R*Math.sin(ang) + offset; }
    // 9시 방향 (i=6): 좌측
    else if(i===6) { offset=22; anchor='end'; lx=cx + R*Math.cos(ang) - offset; }
    // 기타 방향
    else {
      const [lx_tmp, ly_tmp] = pt(i, R+24);
      lx = lx_tmp; ly = ly_tmp;
    }
    
    if(lx===undefined) lx = cx + R*Math.cos(ang);
    if(ly===undefined) ly = cy + R*Math.sin(ang);
    
    labels += `<text x="${lx}" y="${ly}" font-size="9.5" font-weight="600" text-anchor="${anchor}" dominant-baseline="${baseline}" fill="#20242b">${typeLabel}</text>`;
  }
  let dp=[]; for(let i=0;i<n;i++){ dp.push(pt(i, ((scores[ORDER[i]]||0)/maxScore)*R)); }
  const poly = dp.map(p=>p.join(',')).join(' ');
  const dots = dp.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="${typeColor(ORDER[i])}"/>`).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${rings}${spokes}<polygon points="${poly}" fill="rgba(35,41,70,0.18)" stroke="#232946" stroke-width="2"/>${dots}${labels}</svg>`;
}

/* ========== 결과를 이미지(PNG)로 저장 ========== */
// SVG 텍스트를 여러 줄로 자동 줄바꿈
function wrapSvgText(text, maxChars){
  const words = String(text).split(' ');
  const lines = []; let cur = '';
  words.forEach(w=>{
    if((cur+' '+w).trim().length > maxChars){ if(cur) lines.push(cur); cur = w; }
    else cur = (cur? cur+' ':'')+w;
  });
  if(cur) lines.push(cur);
  return lines;
}

// SVG 문자열을 PNG로 변환해 저장/공유 (모바일 갤러리 저장 지원)
function saveSvgAsImage(svgString, filename){
  try{
    const svgBlob = new Blob([svgString], {type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(svgBlob);
    const img = new Image();
    img.onload = function(){
      const scale = 2;
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.scale(scale, scale);
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      canvas.toBlob(async function(blob){
        if(!blob){ alert('이미지 생성에 실패했어요. 화면을 캡처해 주세요.'); return; }
        const file = new File([blob], filename, {type:'image/png'});
        // 1순위: 공유 시트(모바일에서 "이미지 저장"/"사진에 저장" 가능)
        if(navigator.canShare && navigator.canShare({files:[file]})){
          try{
            await navigator.share({files:[file], title:'에니어그램 결과'});
            return;
          }catch(e){ /* 사용자가 취소하면 아래로 진행 안 함 */ 
            if(e && e.name==='AbortError') return;
          }
        }
        // 2순위: 새 탭에 이미지 열기 → 사용자가 길게 눌러 "이미지 저장"
        const dataUrl = canvas.toDataURL('image/png');
        const win = window.open();
        if(win && win.document){
          win.document.write('<html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>'+filename+'</title></head><body style="margin:0;background:#111;text-align:center;"><p style="color:#fff;font-family:sans-serif;font-size:14px;padding:12px;">이미지를 길게 눌러 "이미지 저장"을 선택하세요</p><img src="'+dataUrl+'" style="max-width:100%;height:auto;"></body></html>');
          win.document.close();
        } else {
          // 3순위: 다운로드 (팝업 차단 시)
          const a = document.createElement('a');
          a.href = dataUrl; a.download = filename;
          document.body.appendChild(a); a.click();
          setTimeout(()=>document.body.removeChild(a), 1000);
        }
      }, 'image/png');
    };
    img.onerror = function(){ URL.revokeObjectURL(url); alert('이미지 생성에 실패했어요. 화면을 캡처해 주세요.'); };
    img.src = url;
  }catch(e){ alert('이미지 생성에 실패했어요. 화면을 캡처해 주세요.'); }
}

    return {svg:lines.join(''), endY:yy};

  const left = summaryBlock(50, ka, a.name, '#1f4fd8');
  const right = summaryBlock(50+(W-100)/2+20, kb, b.name, '#e01e37');
  parts.push(left.svg); parts.push(right.svg);
  y = Math.max(left.endY, right.endY)+40;
  // 푸터
  parts.push(`<line x1="40" y1="${y}" x2="${W-40}" y2="${y}" stroke="#ddd"/>`); y+=26;
  parts.push(T(W/2,y,'AROM.D',{size:16,weight:700,color:'#232946',anchor:'middle'}));y+=20;
  parts.push(T(W/2,y,'커플 에니어그램 · 9개 유형에 따른 커플 분석',{size:11,color:'#7a7266',anchor:'middle'}));y+=16;
  parts.push(T(W/2,y,'© AROM.D. 무단 복제·배포를 금합니다.',{size:10,color:'#7a7266',anchor:'middle'}));y+=30;

  const H=y;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" fill="#f6f2ea"/>${parts.join('')}</svg>`;
}

function drawRadar(container, scores){
  const size=320, cx=size/2, cy=size/2, R=118, maxScore=45;
  const n=9;
  const ORDER = [9,1,2,3,4,5,6,7,8]; // 9를 12시(맨위)로
  const angle = i => (Math.PI*2*i/n) - Math.PI/2;
  const pt = (i, r) => [cx + r*Math.cos(angle(i)), cy + r*Math.sin(angle(i))];

  let rings='';
  [0.25,0.5,0.75,1].forEach(f=>{
    let pts=[];
    for(let i=0;i<n;i++){ const [x,y]=pt(i,R*f); pts.push(`${x},${y}`); }
    rings += `<polygon points="${pts.join(' ')}" fill="none" stroke="#d9d0bd" stroke-width="1"/>`;
  });

  let spokes='', labels='';
  for(let i=0;i<n;i++){
    const [x,y]=pt(i,R);
    spokes += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#d9d0bd" stroke-width="1"/>`;
    const typeObj = TYPES.find(t=>t.id===ORDER[i]);
    const typeLabel = `${ORDER[i]}${typeObj?.name||''}`;
    
    // 각 방향별 라벨 거리와 정렬 조정
    let lx, ly, anchor='middle', baseline='middle', offset=24;
    const ang = angle(i);
    
    // 12시 방향 (i=0): 위쪽
    if(i===0) { offset=28; baseline='bottom'; ly=cy + R*Math.sin(ang) - offset; lx=cx + R*Math.cos(ang); }
    // 3시 방향 (i=2): 우측
    else if(i===2) { offset=22; anchor='start'; lx=cx + R*Math.cos(ang) + offset; ly=cy + R*Math.sin(ang); }
    // 6시 방향 (i=4): 아래쪽
    else if(i===4) { offset=28; baseline='top'; ly=cy + R*Math.sin(ang) + offset; lx=cx + R*Math.cos(ang); }
    // 9시 방향 (i=6): 좌측
    else if(i===6) { offset=22; anchor='end'; lx=cx + R*Math.cos(ang) - offset; ly=cy + R*Math.sin(ang); }
    // 기타 방향
    else {
      const [lx_tmp, ly_tmp] = pt(i, R+24);
      lx = lx_tmp; ly = ly_tmp;
    }
    
    labels += `<text x="${lx}" y="${ly}" font-size="9.5" font-weight="600" text-anchor="${anchor}" dominant-baseline="${baseline}" fill="#20242b" font-family="Noto Sans KR, sans-serif">${typeLabel}</text>`;
  }

  let dataPts=[];
  for(let i=0;i<n;i++){
    const s = scores[ORDER[i]]||0;
    const r = (s/maxScore)*R;
    dataPts.push(pt(i,r));
  }
  const dataPoly = dataPts.map(p=>p.join(',')).join(' ');
  const dots = dataPts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="${typeColor(ORDER[i])}"/>`).join('');

  container.innerHTML = `
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      ${rings}${spokes}
      <polygon points="${dataPoly}" fill="rgba(35,41,70,0.18)" stroke="#232946" stroke-width="2"/>
      ${dots}${labels}
    </svg>
  `;
}

/* ---------- 커플 프로파일 ---------- */
// KEPTI 스타일 꺾은선 그래프: 가로축 2,3,4,5,6,7,8,9,1 / 세로축 9~45 / 두 사람 선 겹침
function profileLineSVG(seriesList){
  const W=740, H=560, padL=44, padR=78, padT=48, padB=48;
  const plotW = W-padL-padR, plotH = H-padT-padB;
  const yMin=9, yMax=45;
  const n = PROFILE_ORDER.length;
  const colW = plotW/n;
  const xAt = i => padL + colW*(i+0.5);
  const yAt = v => padT + plotH*(1-(v-yMin)/(yMax-yMin));

  const groups = [
    {txt:'가슴(감정)중심', from:0, to:2, bg:'#eef4f9'},
    {txt:'머리(사고)중심', from:3, to:5, bg:'#dceaf5'},
    {txt:'장(본능)중심', from:6, to:8, bg:'#eef4f9'},
  ];
  let groupBg='';
  groups.forEach(g=>{
    const xL = padL+colW*g.from, xR = padL+colW*(g.to+1);
    groupBg += `<rect x="${xL.toFixed(1)}" y="${padT}" width="${(xR-xL).toFixed(1)}" height="${plotH}" fill="${g.bg}"/>`;
  });

  let grid='';
  for(let v=yMin; v<=yMax; v++){
    const y=yAt(v);
    grid += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${padL+plotW}" y2="${y.toFixed(1)}" stroke="#c9d6e2" stroke-width="0.5"/>`;
  }
  for(let v=9; v<=45; v+=3){
    const y=yAt(v);
    grid += `<text x="${padL-6}" y="${(y+3).toFixed(1)}" font-size="9" text-anchor="end" fill="#7a8a9a">${v}</text>`;
    grid += `<text x="${padL+plotW+4}" y="${(y+3).toFixed(1)}" font-size="9" text-anchor="start" fill="#7a8a9a">${v}</text>`;
  }

  const zoneLabels = [
    {v:45, label:'매우높음'},{v:36, label:'평균이상'},{v:27, label:'평균'},{v:18, label:'평균이하'},{v:9, label:'매우낮음'},
  ];
  let zlabels='';
  zoneLabels.forEach(z=>{
    const y=yAt(z.v);
    zlabels += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${padL+plotW}" y2="${y.toFixed(1)}" stroke="#9fb3c4" stroke-width="1"/>`;
    zlabels += `<text x="${padL+plotW+18}" y="${(y+3).toFixed(1)}" font-size="10" fill="#4a6580" font-weight="600">${z.label}</text>`;
  });

  let cols='';
  for(let i=0;i<=n;i++){
    const x=padL+colW*i;
    cols += `<line x1="${x.toFixed(1)}" y1="${padT}" x2="${x.toFixed(1)}" y2="${padT+plotH}" stroke="#b8c8d6" stroke-width="0.8"/>`;
  }
  groups.forEach(g=>{
    const xR = padL+colW*(g.to+1);
    cols += `<line x1="${xR.toFixed(1)}" y1="${padT}" x2="${xR.toFixed(1)}" y2="${padT+plotH}" stroke="#7a94a8" stroke-width="1.5"/>`;
  });

  let xnum='';
  for(let i=0;i<n;i++){
    xnum += `<text x="${xAt(i).toFixed(1)}" y="${(padT+plotH+18).toFixed(1)}" font-size="13" font-weight="700" text-anchor="middle" fill="#20242b">${PROFILE_ORDER[i]}</text>`;
  }

  let groupHdr='';
  groups.forEach(g=>{
    const xL = padL+colW*g.from, xR = padL+colW*(g.to+1);
    const xMid = (xL+xR)/2;
    groupHdr += `<text x="${xMid.toFixed(1)}" y="${padT-14}" font-size="11" text-anchor="middle" fill="#4a6580" font-weight="600">${g.txt}</text>`;
  });

  function linePath(scores, color){
    const pts = PROFILE_ORDER.map((tid,i)=>[xAt(i), yAt(Math.max(yMin,Math.min(yMax,scores[tid]||yMin)))]);
    const path = pts.map((p,i)=>`${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
    const dots = pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="5" fill="${color}" stroke="#fff" stroke-width="1.5"/>`).join('');
    return `<path d="${path}" fill="none" stroke="${color}" stroke-width="2.5"/>${dots}`;
  }
  const lines = seriesList.map(s=>linePath(s.scores, s.color)).join('');

  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="max-width:${W}px;">
    <rect x="${padL}" y="${padT}" width="${plotW}" height="${plotH}" fill="#f5faff" stroke="#7a94a8" stroke-width="1.2"/>
    ${groupBg}${grid}${zlabels}${cols}${xnum}${groupHdr}
    ${lines}
  </svg>`;
}

function coupleLineSVG(scoresA, scoresB){
  return profileLineSVG([{scores:scoresA, color:'#1f4fd8'}, {scores:scoresB, color:'#e01e37'}]);
}
function personLineSVG(scores){
  return profileLineSVG([{scores:scores, color:'#232946'}]);

function coupleKeywords(person){
  const w = calcWing(person.scores);

  return {
    label: `${w.label} ${w.wingName||main.name}`,
    typeLabel: `${main.id}번 ${main.name}`,
    main, wing:w.wing, wingTypeName: wingT.name, wingNick: w.wingName, wingDesc: w.wingDesc,
    tagline: main.tagline,
    desc: main.desc,
    strength: main.strength, weakness: main.weakness, growth: main.growth, motto: main.motto, jobs: main.jobs,
    stressType: typeById(dir.stress), growthType: typeById(dir.growth),
  };
}

            return `<tr><td>${tid}번 ${t.name}</td><td style="text-align:right;font-family:monospace;">${a.scores[tid]}</td><td style="text-align:right;font-family:monospace;">${b.scores[tid]}</td></tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

  document.getElementById('coupleChart').innerHTML = coupleLineSVG(a.scores, b.scores);
  document.getElementById('backListBtn').onclick = ()=>{ state._listSynced=false; state.view='list'; render(); };
  document.getElementById('couplePrintBtn').onclick = ()=>doPrintCouple();
}

  const svg = buildCoupleSVG();

/* ---------- 목록 ---------- */
// Firebase에서 최신 응답을 받아 로컬 캐시와 병합
async function syncFromFirebase(){
  const remote = await fbGetResponses();
  if(remote === null) return false; // Firebase 미연결/실패 → 로컬 캐시 유지
  const remoteIds = new Set(remote.map(r=>r.id));
  // '_pending'(업로드 실패로 아직 못 올라간 것)만 다시 올린다. 그 외 로컬 전용은 무시(=다른 기기서 삭제된 것).
  const local = getResponses();
  for(const r of local){
    if(r._pending && !remoteIds.has(r.id)){
      const ok = await fbSaveResponse(r);
      if(ok){ delete r._pending; remote.push(r); }
    }
  }
  // Firebase 내용을 기준으로 로컬 캐시를 교체 → 다른 기기에서 삭제된 것은 여기서 사라짐
  const sorted = remote.slice().sort((a,b)=> (a.date<b.date?-1:1));
  saveResponses(sorted);
  return true;
}

async function renderList(app){
  const selecting = state.coupleSelecting || false;
  const selected = state.coupleSelected || [];

  // 먼저 로컬 캐시로 즉시 표시, 그다음 Firebase에서 최신본 동기화
  if(!selecting && !state._listSynced){
    syncFromFirebase().then(ok=>{
      if(ok){ state._listSynced = true; if(state.view==='list') renderList(app); }
    });
  }
  const list = (await getResponses()).slice().reverse();

  app.innerHTML = `
    <div class="hero" style="padding-top:0;">
      <h1 class="serif" style="font-size:24px;">응답 목록</h1>
      <p>총 ${list.length}건${selecting? ' · 커플로 묶을 두 사람을 선택하세요 ('+selected.length+'/2)':''}${(!selecting && !state._listSynced)? ' · 동기화 중…':''}</p>
    </div>

    <div class="no-print" style="display:flex;gap:8px;margin-bottom:14px;">
      ${!selecting
        ? `<button class="btn-primary" id="coupleStartBtn" style="flex:1;">💑 커플 프로파일 만들기</button>
           <button class="btn-ghost" id="refreshBtn" style="flex-shrink:0;">↻</button>`
        : `<button class="btn-primary" id="coupleMakeBtn" style="flex:1;" ${selected.length===2?'':'disabled'}>선택 완료 (${selected.length}/2)</button>
           <button class="btn-ghost" id="coupleCancelBtn" style="flex:1;">취소</button>`}
    </div>

    <div id="listBody"></div>
    ${list.length===0 && state._listSynced? '<div class="card"><p style="color:var(--muted);font-size:13.5px;margin:0;">아직 응답이 없습니다.</p></div>':''}
  `;

  const tbody = document.getElementById('listBody');
  list.forEach(rec=>{
    const ranked = TYPES.map(t=>({...t, score:rec.scores[t.id]})).sort((a,b)=>b.score-a.score);
    const top = ranked[0];
    const w = calcWing(rec.scores);
    const d = new Date(rec.date);
    const isSel = selected.some(s=>s.id===rec.id);
    const dateStr = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    const age = birthToIntlAge(rec.birth);
    const info = [rec.gender, rec.relation, age!==''?`만 ${age}세`:'', rec.job].filter(Boolean).map(esc).join(' · ');
    const row = document.createElement('div');
    row.className = 'list-row' + (isSel?' sel':'');

    if(selecting){
      row.innerHTML = `
        <div class="lr-check">${isSel?'✅':'⬜'}</div>
        <div class="lr-main">
          <div class="lr-name">${esc(rec.name)}</div>
          ${info?`<div class="lr-info">${info}</div>`:''}
        </div>
        <div class="lr-right">
          <div class="lr-type" style="background:${typeColor(top.id)};">${w.label}</div>
          <div class="lr-date mono">${dateStr}</div>
        </div>`;
      row.onclick = ()=>{
        let sel = state.coupleSelected || [];
        if(sel.some(s=>s.id===rec.id)){ sel = sel.filter(s=>s.id!==rec.id); }
        else { if(sel.length>=2){ alert('두 사람까지만 선택할 수 있어요. 먼저 선택을 해제해주세요.'); return; } sel = [...sel, rec]; }
        state.coupleSelected = sel;
        renderList(app);
      };
    } else {
      row.innerHTML = `
        <div class="lr-main">
          <div class="lr-name">${esc(rec.name)} <span class="lr-typename">${top.name}</span></div>
          ${info?`<div class="lr-info">${info}</div>`:''}
        </div>
        <div class="lr-right">
          <div class="lr-type" style="background:${typeColor(top.id)};">${w.label}</div>
          <div class="lr-date mono">${dateStr}</div>
        </div>
        <div class="lr-del" data-id="${rec.id}" title="삭제">🗑</div>`;
      row.onclick = (e)=>{
        if(e.target.classList.contains('lr-del')){
          e.stopPropagation();
          if(confirm(`${rec.name}님의 응답을 삭제할까요? 되돌릴 수 없어요.`)){
            const all = getResponses().filter(r=>r.id!==rec.id);
            saveResponses(all);
            fbDeleteResponse(rec.id);
            renderList(app);
          }
          return;
        }
        state.lastResult = rec; state.view='result'; render();
      };
    }
    tbody.appendChild(row);
  });

  if(!selecting){
    const cs = document.getElementById('coupleStartBtn');
    if(cs) cs.onclick = ()=>{ state.coupleSelecting=true; state.coupleSelected=[]; renderList(app); };
    const rf = document.getElementById('refreshBtn');
    if(rf) rf.onclick = ()=>{ state._listSynced=false; renderList(app); };
  } else {
    const cm = document.getElementById('coupleMakeBtn');
    if(cm) cm.onclick = ()=>{
      if((state.coupleSelected||[]).length!==2){ alert('두 사람을 선택해주세요.'); return; }
      state.couple = { a: state.coupleSelected[0], b: state.coupleSelected[1] };
      state.coupleSelecting=false;
      state.view='couple';
      render();
    };
    const cc = document.getElementById('coupleCancelBtn');
    if(cc) cc.onclick = ()=>{ state.coupleSelecting=false; state.coupleSelected=[]; renderList(app); };
  }
}

function init(){
  if(!IS_ADMIN){
    const d = getDraft();
    if(draftHasProgress(d)){
      if(confirm('작성하던 응답이 있어요. 이전에 작성한 문항부터 이어서 시작하시겠습니까?\n(취소를 누르면 처음부터 새로 시작합니다)')){
        state.answers = d.answers || {};
        state.meta = d.meta || {name:'',gender:'',relations:[],job:'',birth:''};
        state.page = Math.min(d.page || 0, TOTAL_PAGES);
        state.view = 'survey';
      } else {
        clearDraft();
      }
    }
  }
  render();
}
init();
